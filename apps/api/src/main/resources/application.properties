spring.application.name=auvan-backend

# ===================================================
# Database - Supabase PostgreSQL
# Use environment variables later; defaults are placeholders.
# ===================================================
spring.datasource.url=${SUPABASE_DB_URL:jdbc:postgresql://db.YOURPROJECT.supabase.co:5432/postgres}
spring.datasource.username=${SUPABASE_DB_USERNAME:postgres}
spring.datasource.password=${SUPABASE_DB_PASSWORD:YOUR_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ===================================================
# JPA / Hibernate
# ===================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ===================================================
# Flyway - Database migrations
# ===================================================
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# ===================================================
# Server
# ===================================================
server.port=${PORT:8080}
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ===================================================
# JWT Authentication
# ===================================================
jwt.secret=${JWT_SECRET:CHANGE_ME_TO_A_REAL_SECRET_WITH_AT_LEAST_32_CHARS}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}

# ===================================================
# Internal worker authentication
# ===================================================
internal.worker.secret=${INTERNAL_WORKER_SECRET:CHANGE_ME_WORKER_SECRET}

# ===================================================
# LINE Integration
# ===================================================
line.liff.channel.id=${LINE_LIFF_CHANNEL_ID:YOUR_LINE_LIFF_CHANNEL_ID}
line.channel.access.token=${LINE_CHANNEL_ACCESS_TOKEN:YOUR_LINE_CHANNEL_ACCESS_TOKEN}
line.channel.secret=${LINE_CHANNEL_SECRET:YOUR_LINE_CHANNEL_SECRET}

# ===================================================
# Email (SMTP)
# ===================================================
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:YOUR_EMAIL@gmail.com}
spring.mail.password=${SMTP_PASSWORD:YOUR_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
mail.from=${MAIL_FROM:noreply@auvan.app}

# ===================================================
# Booking behaviour
# ===================================================
seat.lock.timeout.seconds=${SEAT_LOCK_TIMEOUT_SECONDS:300}
seat.lock.cleanup.interval.ms=${SEAT_LOCK_CLEANUP_INTERVAL_MS:60000}
payment.deadline.minutes.before.departure=${PAYMENT_DEADLINE_MINUTES_BEFORE_DEPARTURE:60}
booking.expiry.sweep.limit=${BOOKING_EXPIRY_SWEEP_LIMIT:30}

# ===================================================
# Reminder jobs
# ===================================================
reminder.schedule.mode=${REMINDER_SCHEDULE_MODE:daily_batch}
reminder.batch.hour.utc=${REMINDER_BATCH_HOUR_UTC:1}
reminder.max.attempts=${REMINDER_MAX_ATTEMPTS:5}

# ===================================================
# Async thread pool
# ===================================================
spring.task.execution.pool.core-size=${ASYNC_CORE_SIZE:4}
spring.task.execution.pool.max-size=${ASYNC_MAX_SIZE:16}
spring.task.execution.pool.queue-capacity=${ASYNC_QUEUE_CAPACITY:100}
spring.task.execution.thread-name-prefix=${ASYNC_THREAD_NAME_PREFIX:auvan-async-}

# ===================================================
# Actuator
# ===================================================
management.endpoints.web.exposure.include=${ACTUATOR_EXPOSE:health,info}
management.endpoint.health.show-details=when-authorized
